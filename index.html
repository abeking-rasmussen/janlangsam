<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Jan Langsam — Pirat, Abeking &amp; Rasmussen, 1962</title>
<style>

  :root{
    --navy: #10222c;
    --navy-deep: #0a161d;
    --brass: #c7a15a;
    --brass-soft: #e4cd94;
    --cream: #f4efe4;
    --line: rgba(199,161,90,0.28);
  }

  *{ box-sizing:border-box; }

  html{ scroll-behavior:smooth; }

  body{
    margin:0;
    background:var(--navy-deep);
    color:var(--cream);
    font-family: "Public Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  header{
    padding: 6rem 1.5rem 4rem;
    text-align:center;
    background:
      radial-gradient(ellipse at 50% -10%, rgba(199,161,90,0.10), transparent 60%),
      var(--navy);
    border-bottom: 1px solid var(--line);
  }

  .eyebrow{
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-size: 0.72rem;
    color: var(--brass);
    margin: 0 0 1.1rem;
  }

  h1{
    font-family: "Fraunces", "Iowan Old Style", Georgia, serif;
    font-weight: 600;
    font-style: italic;
    font-size: clamp(2.2rem, 6vw, 3.6rem);
    margin: 0 0 0.6rem;
    letter-spacing: 0.01em;
  }

  .subtitle{
    font-size: 1rem;
    color: rgba(244,239,228,0.72);
    max-width: 34rem;
    margin: 0 auto;
    line-height: 1.6;
  }

  .rule{
    width: 64px;
    height: 1px;
    background: var(--brass);
    margin: 2rem auto 0;
    opacity: 0.6;
  }

  main{
    max-width: 900px;
    margin: 0 auto;
    padding: 3.5rem 1.25rem 6rem;
  }

  figure{
    margin: 0 0 4rem;
  }

  figure img{
    display:block;
    width:100%;
    height:auto;
    border-radius: 3px;
    background: var(--navy);
    box-shadow: 0 20px 50px -25px rgba(0,0,0,0.7);
  }

  figcaption{
    display:flex;
    align-items:baseline;
    gap: 0.75rem;
    margin-top: 0.9rem;
    padding-left: 0.1rem;
    font-size: 0.88rem;
    color: rgba(244,239,228,0.62);
  }

  figcaption .num{
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    color: var(--brass);
    font-size: 0.95rem;
    min-width: 1.6rem;
  }

  footer{
    text-align:center;
    padding: 3rem 1.5rem 5rem;
    border-top: 1px solid var(--line);
    color: rgba(244,239,228,0.45);
    font-size: 0.82rem;
    letter-spacing: 0.03em;
  }

  @media (max-width: 560px){
    header{ padding: 4rem 1.25rem 3rem; }
    main{ padding: 2.5rem 1rem 4rem; }
    figure{ margin-bottom: 3rem; }
  }

  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior:auto; }
  }

</style>
</head>
<body>

<header>
  <p class="eyebrow">Abeking &amp; Rasmussen · Baujahr 1962</p>
  <h1>Jan Langsam</h1>
  <p class="subtitle">Weitere Bilder zur Piraten-Jolle — Restaurierung, Deck, Rumpf, Segel und Zubehör.</p>
  <div class="rule"></div>
</header>

<main id="gallery"></main>

<footer>
  Private Bildergalerie · nicht öffentlich gelistet
</footer>

<script>
  // Trage hier einfach den Dateinamen jedes Bildes ein (liegt im Ordner "images/").
  // Reihenfolge der Liste = Reihenfolge auf der Seite.
  // Optional: Text hinter dem Komma ist die Bildunterschrift (kann auch leer bleiben: "").

  const bilder = [
    ["IMG_01.jpeg", "Gesamtansicht"],
    ["IMG_02.jpeg", "Deck"],
    ["IMG_03.jpeg", "Unterwasserschiff"],
    // ... weitere Zeilen einfach ergänzen, Komma nicht vergessen
  ];

  const gallery = document.getElementById('gallery');

  bilder.forEach(([datei, text], i) => {
    const fig = document.createElement('figure');

    const img = document.createElement('img');
    img.src = 'images/' + datei;
    img.loading = 'lazy';
    img.alt = text || datei;

    const cap = document.createElement('figcaption');
    const num = document.createElement('span');
    num.className = 'num';
    num.textContent = String(i + 1).padStart(2, '0');
    cap.appendChild(num);
    if (text) {
      const txt = document.createElement('span');
      txt.textContent = text;
      cap.appendChild(txt);
    }

    fig.appendChild(img);
    fig.appendChild(cap);
    gallery.appendChild(fig);
  });
</script>

</body>
</html>
