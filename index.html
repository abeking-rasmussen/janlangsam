<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">

<title>Jan Langsam — Pirat, Abeking &amp; Rasmussen, 1962</title>
<style>
  :root{
    --navy: #10222c;
    --navy-deep: #0a161d;
    --brass: #c7a15a;
    --brass-soft: #e4cd94;
    --cream: #f4efe4;
    --line: rgba(199,161,90,0.28);
  }
  *{ box-sizing:border-box; }
  html{ scroll-behavior:smooth; }
  body{
    margin:0;
    background:var(--navy-deep);
    color:var(--cream);
    font-family: "Public Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  header{
    padding: 6rem 1.5rem 4rem;
    text-align:center;
    background:
      radial-gradient(ellipse at 50% -10%, rgba(199,161,90,0.10), transparent 60%),
      var(--navy);
    border-bottom: 1px solid var(--line);
  }
  .eyebrow{
    letter-spacing: 0.22em;
    text-transform: uppercase;
    font-size: 0.72rem;
    color: var(--brass);
    margin: 0 0 1.1rem;
  }
  h1{
    font-family: "Fraunces", "Iowan Old Style", Georgia, serif;
    font-weight: 600;
    font-style: italic;
    font-size: clamp(2.2rem, 6vw, 3.6rem);
    margin: 0 0 0.6rem;
    letter-spacing: 0.01em;
  }
  .subtitle{
    font-size: 1rem;
    color: rgba(244,239,228,0.72);
    max-width: 34rem;
    margin: 0 auto;
    line-height: 1.6;
  }
  .rule{
    width: 64px;
    height: 1px;
    background: var(--brass);
    margin: 2rem auto 0;
    opacity: 0.6;
  }
  .ebay-cta{
    display:inline-flex;
    align-items:center;
    gap: 0.5rem;
    margin-top: 2.2rem;
    padding: 0.75rem 1.6rem;
    border: 1px solid var(--brass);
    border-radius: 999px;
    color: var(--brass-soft);
    text-decoration: none;
    font-size: 0.88rem;
    letter-spacing: 0.02em;
    transition: background 0.2s ease, color 0.2s ease;
  }
  .ebay-cta:hover{
    background: var(--brass);
    color: var(--navy-deep);
  }
  .ebay-cta svg{
    width: 14px;
    height: 14px;
    flex-shrink: 0;
  }
  main{
    max-width: 900px;
    margin: 0 auto;
    padding: 3.5rem 1.25rem 6rem;
  }
  figure{
    margin: 0 0 4rem;
  }
  figure img{
    display:block;
    width:100%;
    height:auto;
    border-radius: 3px;
    background: var(--navy);
    box-shadow: 0 20px 50px -25px rgba(0,0,0,0.7);
  }
  figcaption{
    display:flex;
    align-items:baseline;
    gap: 0.75rem;
    margin-top: 0.9rem;
    padding-left: 0.1rem;
    font-size: 0.88rem;
    color: rgba(244,239,228,0.62);
  }
  figcaption .num{
    font-family: "Fraunces", Georgia, serif;
    font-style: italic;
    color: var(--brass);
    font-size: 0.95rem;
    min-width: 1.6rem;
  }
  footer{
    text-align:center;
    padding: 3rem 1.5rem 5rem;
    border-top: 1px solid var(--line);
    color: rgba(244,239,228,0.45);
    font-size: 0.82rem;
    letter-spacing: 0.03em;
  }
  footer a{
    color: var(--brass);
    text-decoration: none;
    border-bottom: 1px solid rgba(199,161,90,0.4);
  }
  footer a:hover{
    border-bottom-color: var(--brass);
  }
  @media (max-width: 560px){
    header{ padding: 4rem 1.25rem 3rem; }
    main{ padding: 2.5rem 1rem 4rem; }
    figure{ margin-bottom: 3rem; }
  }
  @media (prefers-reduced-motion: reduce){
    html{ scroll-behavior:auto; }
  }
</style>
</head>
<body>
